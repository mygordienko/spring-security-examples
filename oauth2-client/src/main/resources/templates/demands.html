<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Demands')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${activePage}, ${hasHrRole}, ${hasManagerRole})}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/header :: header(${username})}"></header>
        <main class="content-panel">
            <div class="page-top">
                <div>
                    <p class="eyebrow">Management</p>
                    <h1>Demands</h1>
                </div>
                <div class="pager">
                    <button type="button" id="demand-prev">Previous</button>
                    <span id="demand-page-info">Loading...</span>
                    <button type="button" id="demand-next">Next</button>
                </div>
            </div>
            <table class="data-table">
                <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Author</th>
                    <th>Type</th>
                </tr>
                </thead>
                <tbody id="demand-body">
                <tr><td colspan="3">Loading...</td></tr>
                </tbody>
            </table>
        </main>
    </div>
</div>
<script>
    const demandState = { offset: 0, limit: 10 };

    async function loadDemands() {
        const response = await fetch(`/api/v1/demands?offset=${demandState.offset}&limit=${demandState.limit}`);
        const page = await response.json();
        const tbody = document.getElementById('demand-body');
        const pageInfo = document.getElementById('demand-page-info');
        const prev = document.getElementById('demand-prev');
        const next = document.getElementById('demand-next');

        if (!response.ok) {
            throw new Error('Failed to load demands');
        }

        if (!page.items.length) {
            tbody.innerHTML = '<tr><td colspan="3">No demands found.</td></tr>';
        } else {
            tbody.innerHTML = page.items.map(item => `
                <tr>
                    <td>${item.timestamp}</td>
                    <td>${item.author}</td>
                    <td><span class="tag">${item.type}</span></td>
                </tr>
            `).join('');
        }

        const from = page.total === 0 ? 0 : page.offset + 1;
        const to = Math.min(page.offset + page.limit, page.total);
        pageInfo.textContent = `${from}-${to} of ${page.total}`;
        prev.disabled = page.offset === 0;
        next.disabled = page.offset + page.limit >= page.total;
    }

    document.getElementById('demand-prev').addEventListener('click', () => {
        demandState.offset = Math.max(0, demandState.offset - demandState.limit);
        loadDemands();
    });

    document.getElementById('demand-next').addEventListener('click', () => {
        demandState.offset += demandState.limit;
        loadDemands();
    });

    loadDemands().catch(() => {
        document.getElementById('demand-body').innerHTML =
            '<tr><td colspan="3">Failed to load demands.</td></tr>';
        document.getElementById('demand-page-info').textContent = 'Unavailable';
    });
</script>
</body>
</html>
